<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dev Cloud Journey | Compliment & Joke Generator</title>

    <!-- Typography: Inter for Headings/Main Text -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- ========================================== -->
    <!-- STYLES.CSS EQUIVALENT                      -->
    <!-- ========================================== -->
    <style>
      /* --- Design Tokens (Color Palette & Typography) --- */
      :root {
        /* Casino Theme Colors */
        --felt-green: #0b3d1f;
        --felt-pattern: rgba(0, 0, 0, 0.15);
        --card-bg: #ffffff;
        --text-primary: #1e293b;
        --text-secondary: #64748b;
        --text-accent: #e11d48; /* For joke punchlines */
        --border-color: rgba(226, 232, 240, 0.8);
        --button-dark: #0f172a;
        --button-dark-hover: #334155;
        --button-light: #f1f5f9;
        --button-light-hover: #e2e8f0;

        --font-display: "Inter", sans-serif;
        --font-body:
          system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Oxygen, Ubuntu, Cantarell, sans-serif;

        --shadow-card:
          0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 0, 0, 0.05);
        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        --radius-card: 18px;
        --radius-sm: 8px;
      }

      /* --- Global Resets & Base Styles --- */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font-body);
        /* Casino Felt Background */
        background-color: var(--felt-green);
        background-image:
          radial-gradient(
            circle at center,
            rgba(255, 255, 255, 0.05) 0%,
            rgba(0, 0, 0, 0.4) 100%
          ),
          url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0h20v20H0V0zm10 10l10 10v-5L15 10l5-5V0L10 10zM0 10l10 10v-5L5 10l5-5V0L0 10z' fill='%23000000' fill-opacity='0.1' fill-rule='evenodd'/%3E%3C/svg%3E");
        color: #ffffff;
        line-height: 1.5;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 2rem 1rem;
        overflow-x: hidden;
      }

      /* --- Layout & Containers --- */
      .app-container {
        width: 100%;
        max-width: 400px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2rem;
      }

      .header {
        text-align: center;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
      }

      .header h1 {
        font-family: var(--font-display);
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.025em;
        margin-bottom: 0.25rem;
      }

      .header p {
        color: rgba(255, 255, 255, 0.8);
        font-size: 0.875rem;
      }

      /* --- Playing Card Surface --- */
      .card {
        background-color: var(--card-bg);
        /* Standard playing card ratio applied to fixed dimensions */
        width: 320px;
        height: 448px;
        border-radius: var(--radius-card);
        box-shadow: var(--shadow-card);
        position: relative;
        display: flex;
        flex-direction: column;
        padding: 2.5rem 1.5rem 1.5rem 1.5rem;
        color: var(--text-primary);
        /* Inner card border styling */
        border: 1px solid #e2e8f0;
      }

      .card::before {
        content: "";
        position: absolute;
        top: 6px;
        left: 6px;
        right: 6px;
        bottom: 6px;
        border: 1px solid rgba(0, 0, 0, 0.05);
        border-radius: 12px;
        pointer-events: none;
      }

      /* --- Dynamic Corner Circles --- */
      .corner-circle {
        position: absolute;
        width: 38px;
        height: 38px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 1.2rem;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        transition: background-color 0.4s ease;
        z-index: 10;
      }

      .top-right {
        top: 14px;
        right: 14px;
      }
      .bottom-left {
        bottom: 14px;
        left: 14px;
      }

      /* --- Main Content Display --- */
      .display-area {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        text-align: center;
        position: relative;
        padding-bottom: 1rem;
      }

      .main-text {
        font-family: var(--font-display);
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--text-primary);
        transition: opacity 0.3s ease;
        line-height: 1.4;
      }

      .punchline-text {
        font-family: var(--font-display);
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--text-accent);
        margin-top: 1.25rem;
        opacity: 0;
        transform: translateY(10px);
        transition:
          opacity 0.5s ease,
          transform 0.5s ease;
      }

      .punchline-text.visible {
        opacity: 1;
        transform: translateY(0);
      }

      .main-text.animate-pop {
        animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }

      @keyframes popIn {
        0% {
          opacity: 0;
          transform: scale(0.9) translateY(5px);
        }
        100% {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }

      /* --- Action Buttons Inside Card --- */
      .button-group {
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
        margin-top: auto;
        z-index: 5;
        padding: 0 1rem;
      }

      .btn-action {
        font-family: var(--font-body);
        font-weight: 600;
        font-size: 0.95rem;
        padding: 0.8rem 1rem;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        width: 100%;
        transition: all 0.2s ease;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .btn-primary {
        background-color: var(--button-dark);
        color: #ffffff;
        box-shadow: 0 4px 6px rgba(15, 23, 42, 0.2);
      }

      .btn-primary:hover:not(:disabled) {
        background-color: var(--button-dark-hover);
        transform: translateY(-1px);
      }

      .btn-secondary {
        background-color: var(--button-light);
        color: var(--text-primary);
        border: 1px solid var(--border-color);
      }

      .btn-secondary:hover:not(:disabled) {
        background-color: var(--button-light-hover);
        transform: translateY(-1px);
      }

      .btn-action:active:not(:disabled) {
        transform: scale(0.98) translateY(0);
      }

      .btn-action:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      /* --- Loading State Indicators --- */
      .loader {
        width: 24px;
        height: 24px;
        border: 3px solid var(--border-color);
        border-bottom-color: var(--button-dark);
        border-radius: 50%;
        display: inline-block;
        animation: rotation 1s linear infinite;
        position: absolute;
      }

      @keyframes rotation {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .hidden {
        display: none !important;
      }

      /* --- History Section (Casino Panel Style) --- */
      .history-section {
        background-color: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: var(--radius-card);
        padding: 1.5rem;
        width: 320px;
        box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
      }

      .history-section h2 {
        font-family: var(--font-display);
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 1rem;
        color: #ffffff;
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        padding-bottom: 0.5rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .history-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .history-item {
        font-size: 0.85rem;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.9);
        background-color: rgba(255, 255, 255, 0.05);
        padding: 0.75rem 1rem;
        border-radius: var(--radius-sm);
        border-left: 3px solid #f59e0b;
        animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        line-height: 1.4;
      }

      .history-item.type-compliment {
        border-left-color: #3b82f6;
      }
      .history-item.type-joke {
        border-left-color: #e11d48;
      }

      .empty-state {
        text-align: center;
        color: rgba(255, 255, 255, 0.5);
        font-size: 0.85rem;
        font-style: italic;
        padding: 0.5rem 0;
      }

      /* --- Clear History Button --- */
      .btn-clear {
        background-color: transparent;
        border: 1px dashed rgba(255, 255, 255, 0.3);
        color: rgba(255, 255, 255, 0.6);
        font-family: var(--font-body);
        font-size: 0.8rem;
        padding: 0.5rem 1rem;
        border-radius: var(--radius-sm);
        cursor: pointer;
        width: 100%;
        margin-top: 1rem;
        transition: all 0.2s ease;
      }

      .btn-clear:hover {
        background-color: rgba(239, 68, 68, 0.2);
        color: #fca5a5;
        border-color: #ef4444;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-15px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
    </style>
  </head>
  <body>
    <main class="app-container">
      <header class="header">
        <h1>Dev Cloud Journey</h1>
        <p>Cloud Architecture & Engineering Portfolio</p>
      </header>

      <!-- Main Playing Card UI -->
      <section class="card" aria-label="Interactive Content Card">
        <!-- Dynamic Corner Indicators -->
        <div
          class="corner-circle top-right"
          id="corner-tr"
          style="background-color: #3b82f6"
        >
          ♠️
        </div>
        <div
          class="corner-circle bottom-left"
          id="corner-bl"
          style="background-color: #ef4444"
        >
          ♥️
        </div>

        <div class="display-area" aria-live="polite">
          <p id="main-text" class="main-text">
            Pick a card to initialize sequence.
          </p>
          <p id="punchline-text" class="punchline-text hidden"></p>
          <div
            id="loading-spinner"
            class="loader hidden"
            aria-label="Loading content"
          ></div>
        </div>

        <!-- Action Buttons Inside Card -->
        <div class="button-group">
          <button id="btn-compliment" class="btn-action btn-primary">
            Generate Compliment
          </button>
          <button id="btn-joke" class="btn-action btn-secondary">
            Generate Joke
          </button>
        </div>
      </section>

      <!-- Persistent History UI -->
      <section class="history-section" aria-label="Recent Items">
        <h2>Recent Activity</h2>
        <ul id="history-list" class="history-list">
          <!-- History items injected via JavaScript -->
        </ul>
        <button id="clear-btn" class="btn-clear hidden">Erase History</button>
      </section>
    </main>

    <!-- ========================================== -->
    <!-- APP.JS EQUIVALENT                          -->
    <!-- ========================================== -->
    <script>
      /**
       * Dev Cloud Journey - Compliment & Joke Generator Logic
       * Architected with modularity to allow seamless transition to a Cloud NoSQL DB.
       */

      // --- 1. Data Mock Layer ---

      const CLOUD_DB_MOCK_COMPLIMENTS = [
        "Your code is so clean, it could be served in a hospital.",
        "You're the CSS to my unstyled HTML.",
        "I'd trust you with my root password.",
        "Your architecture is more robust than a Nokia 3310.",
        "You must be a keyboard, because you're exactly my type.",
        "Your commits are like poetry written in binary.",
        "If you were a function, you'd be `pure` perfection.",
        "You resolve merge conflicts faster than a couples therapist.",
        "Your API endpoints are a joy to consume.",
        "You optimize loops like you're running out of time.",
        "Even the linter has nothing bad to say about you.",
        "You debug with the swagger of a 90s hacker in a movie.",
        "Your documentation is so good, it belongs in a museum.",
        "You handle edge cases like a stunt driver handles tight corners.",
        "Your variables are perfectly named. *Chef's kiss*.",
        "I'd never `git reset --hard` our friendship.",
        "Your pull requests are a breath of fresh air.",
        "You could teach a masterclass on regex.",
        "You're the missing semicolon that fixes everything.",
        "Your CSS grid layouts never break, even on old browsers.",
        "You orchestrate Docker containers like a symphony conductor.",
        "Your SQL queries are so fast, they finish before they start.",
        "If tech debt was literal debt, you'd be a billionaire.",
        "You are the human equivalent of a 200 OK status code.",
        "You make writing tests look genuinely fun.",
        "Your dark mode preferences are impeccably tasteful.",
        "You navigate the command line like a wizard casting spells.",
        "If StackOverflow goes down, I'm calling you.",
        "Your git history is a beacon of hope in a dark codebase.",
        "You deploy to production on Fridays and sleep soundly.",
      ];

      const CLOUD_DB_MOCK_JOKES = [
        {
          setup: "Why did the scarecrow win an award?",
          punchline: "Because he was outstanding in his field.",
        },
        { setup: "What do you call a fake noodle?", punchline: "An impasta." },
        {
          setup: "Why did the bicycle fall over?",
          punchline: "Because it was two tired.",
        },
        {
          setup: "What do you call a bear with no teeth?",
          punchline: "A gummy bear.",
        },
        {
          setup: "Why don't skeletons fight each other?",
          punchline: "They don't have the guts.",
        },
        {
          setup: "What do you call cheese that isn't yours?",
          punchline: "Nacho cheese.",
        },
        {
          setup: "Why did the math book look sad?",
          punchline: "Because it had too many problems.",
        },
        {
          setup: "What do you call a pony with a cough?",
          punchline: "A little horse.",
        },
        {
          setup: "Why couldn't the leopard play hide and seek?",
          punchline: "Because he was always spotted.",
        },
        {
          setup: "What do you call a sleeping dinosaur?",
          punchline: "A dino-snore.",
        },
        {
          setup: "Why did the cookie go to the hospital?",
          punchline: "Because he felt crummy.",
        },
        {
          setup: "What do you call a magic dog?",
          punchline: "A labracadabrador.",
        },
        {
          setup: "Why did the cow cross the road?",
          punchline: "To get to the udder side.",
        },
        {
          setup: "What do you call a belt made out of watches?",
          punchline: "A waist of time.",
        },
        {
          setup: "Why did the golfer bring two pairs of pants?",
          punchline: "In case he got a hole in one.",
        },
        {
          setup: "What do you call a snowman with a six-pack?",
          punchline: "An abdominal snowman.",
        },
        {
          setup: "Why did the tomato turn red?",
          punchline: "Because it saw the salad dressing.",
        },
        {
          setup: "What do you call a factory that makes okay products?",
          punchline: "A satisfactory.",
        },
        {
          setup: "Why did the computer go to the doctor?",
          punchline: "It had a virus.",
        },
        {
          setup: "What do you call a group of musical whales?",
          punchline: "An orca-stra.",
        },
        {
          setup: "Why did the picture go to jail?",
          punchline: "Because it was framed.",
        },
        {
          setup: "What do you call a pig that does karate?",
          punchline: "A pork chop.",
        },
        {
          setup: "Why did the invisible man turn down the job offer?",
          punchline: "He couldn't see himself doing it.",
        },
        {
          setup: "What do you call a fish wearing a bowtie?",
          punchline: "Sofishsticated.",
        },
        {
          setup: "Why did the stadium get hot after the game?",
          punchline: "All the fans left.",
        },
        { setup: "What do you call a careful wolf?", punchline: "Aware wolf." },
        {
          setup: "Why did the student eat his homework?",
          punchline: "Because the teacher told him it was a piece of cake.",
        },
        {
          setup: "What do you call a bee that can't make up its mind?",
          punchline: "A maybe.",
        },
        {
          setup: "Why did the coffee file a police report?",
          punchline: "It got mugged.",
        },
        {
          setup: "What do you call a fly without wings?",
          punchline: "A walk.",
        },
      ];

      // Assets for the dynamic corners
      const CORNER_COLORS = [
        "#EF4444",
        "#F97316",
        "#F59E0B",
        "#10B981",
        "#3B82F6",
        "#6366F1",
        "#8B5CF6",
        "#EC4899",
        "#14B8A6",
        "#0f172a",
      ];
      const CORNER_EMOJIS = [
        "♠️",
        "♥️",
        "♦️",
        "♣️",
        "🎲",
        "🎰",
        "🍒",
        "🍋",
        "🔔",
        "💎",
        "🃏",
        "🎩",
        "🪙",
        "🎯",
      ];

      // --- 2. Service Layer (Data Fetching) ---
      class DataService {
        static async fetchRandomItem(type, previousItem) {
          return new Promise((resolve, reject) => {
            // Simulating 600ms network latency
            setTimeout(() => {
              try {
                const db =
                  type === "joke"
                    ? CLOUD_DB_MOCK_JOKES
                    : CLOUD_DB_MOCK_COMPLIMENTS;
                let nextItem;

                // Prevent consecutive duplicates
                do {
                  const randomIndex = Math.floor(Math.random() * db.length);
                  nextItem = db[randomIndex];
                } while (
                  (type === "joke" &&
                    previousItem &&
                    nextItem.setup === previousItem.setup) ||
                  (type === "compliment" && nextItem === previousItem)
                );

                resolve(nextItem);
              } catch (error) {
                reject(new Error("Network request failed."));
              }
            }, 600);
          });
        }
      }

      // --- 3. Storage Layer (Persistence) ---
      class StorageService {
        static STORAGE_KEY = "devCloud_recentActivity";
        static MAX_HISTORY = 3;

        static getHistory() {
          try {
            const data = localStorage.getItem(this.STORAGE_KEY);
            return data ? JSON.parse(data) : [];
          } catch (e) {
            console.error("Failed to read from localStorage", e);
            return [];
          }
        }

        // Expects an object: { type: 'compliment'|'joke', text: '...' }
        static saveItem(itemObj) {
          let history = this.getHistory();
          history.unshift(itemObj);

          if (history.length > this.MAX_HISTORY) {
            history.pop();
          }

          localStorage.setItem(this.STORAGE_KEY, JSON.stringify(history));
          return history;
        }

        static clearHistory() {
          localStorage.removeItem(this.STORAGE_KEY);
          return [];
        }
      }

      // --- 4. UI/View Layer ---
      const DOM = {
        btnCompliment: document.getElementById("btn-compliment"),
        btnJoke: document.getElementById("btn-joke"),
        mainTextDisplay: document.getElementById("main-text"),
        punchlineDisplay: document.getElementById("punchline-text"),
        spinner: document.getElementById("loading-spinner"),
        historyList: document.getElementById("history-list"),
        clearBtn: document.getElementById("clear-btn"),
        cornerTR: document.getElementById("corner-tr"),
        cornerBL: document.getElementById("corner-bl"),
      };

      class UIManager {
        static setLoadingState(isLoading) {
          if (isLoading) {
            DOM.btnCompliment.disabled = true;
            DOM.btnJoke.disabled = true;
            DOM.mainTextDisplay.classList.add("hidden");
            DOM.punchlineDisplay.classList.add("hidden");
            DOM.spinner.classList.remove("hidden");

            // Reset punchline animation state
            DOM.punchlineDisplay.classList.remove("visible");
            DOM.punchlineDisplay.textContent = "";
          } else {
            DOM.btnCompliment.disabled = false;
            DOM.btnJoke.disabled = false;
            DOM.mainTextDisplay.classList.remove("hidden");
            DOM.spinner.classList.add("hidden");
          }
        }

        static renderText(text, isPunchline = false) {
          const targetEl = isPunchline
            ? DOM.punchlineDisplay
            : DOM.mainTextDisplay;

          if (!isPunchline) {
            targetEl.classList.remove("animate-pop");
            void targetEl.offsetWidth; // Trigger DOM reflow
            targetEl.textContent = text;
            targetEl.classList.add("animate-pop");
          } else {
            targetEl.textContent = text;
            targetEl.classList.remove("hidden");
            // Small delay to ensure display:block applies before opacity transition
            setTimeout(() => targetEl.classList.add("visible"), 50);
          }
        }

        static randomizeCorners() {
          const getRandom = (arr) =>
            arr[Math.floor(Math.random() * arr.length)];

          DOM.cornerTR.style.backgroundColor = getRandom(CORNER_COLORS);
          DOM.cornerBL.style.backgroundColor = getRandom(CORNER_COLORS);

          DOM.cornerTR.textContent = getRandom(CORNER_EMOJIS);
          DOM.cornerBL.textContent = getRandom(CORNER_EMOJIS);
        }

        static renderHistory(historyArray) {
          DOM.historyList.innerHTML = "";

          if (historyArray.length === 0) {
            DOM.historyList.innerHTML =
              '<li class="empty-state">No hands played yet.</li>';
            DOM.clearBtn.classList.add("hidden");
            return;
          }

          historyArray.forEach((item) => {
            const li = document.createElement("li");
            li.className = `history-item type-${item.type}`;
            li.textContent = item.text;
            DOM.historyList.appendChild(li);
          });

          DOM.clearBtn.classList.remove("hidden");
        }
      }

      // --- 5. Application Controller ---
      const AppState = {
        currentItem: null,
        isFetching: false,
        punchlineTimeoutId: null,
      };

      async function handleGenerateEvent(type) {
        if (AppState.isFetching) return;

        // Clear any pending punchline timers if user clicks quickly
        if (AppState.punchlineTimeoutId) {
          clearTimeout(AppState.punchlineTimeoutId);
        }

        AppState.isFetching = true;
        UIManager.setLoadingState(true);

        try {
          // Fetch Data (Async simulation)
          const data = await DataService.fetchRandomItem(
            type,
            AppState.currentItem,
          );
          AppState.currentItem = data;

          UIManager.randomizeCorners();

          if (type === "compliment") {
            UIManager.renderText(data);

            // Save and update history immediately
            const updatedHistory = StorageService.saveItem({
              type: "compliment",
              text: data,
            });
            UIManager.renderHistory(updatedHistory);
          } else if (type === "joke") {
            // Render setup immediately
            UIManager.renderText(data.setup);

            // Delay the punchline for 2.5 seconds
            AppState.punchlineTimeoutId = setTimeout(() => {
              UIManager.renderText(data.punchline, true);

              // Wait to update history until AFTER the punchline is delivered to avoid spoilers
              const formattedJoke = `${data.setup} ${data.punchline}`;
              const updatedHistory = StorageService.saveItem({
                type: "joke",
                text: formattedJoke,
              });
              UIManager.renderHistory(updatedHistory);
            }, 2500);
          }
        } catch (error) {
          console.error("Fetch Error:", error);
          UIManager.renderText("Connection error. The house wins this round.");
        } finally {
          AppState.isFetching = false;
          UIManager.setLoadingState(false);
        }
      }

      function handleClearEvent() {
        const clearedHistory = StorageService.clearHistory();
        UIManager.renderHistory(clearedHistory);
      }

      // --- 6. Initialization ---
      function bootstrapApp() {
        // Load and render initial history
        const initialHistory = StorageService.getHistory();
        UIManager.renderHistory(initialHistory);

        // Attach event listeners
        DOM.btnCompliment.addEventListener("click", () =>
          handleGenerateEvent("compliment"),
        );
        DOM.btnJoke.addEventListener("click", () =>
          handleGenerateEvent("joke"),
        );
        DOM.clearBtn.addEventListener("click", handleClearEvent);
      }

      // Boot the app when the DOM is ready
      document.addEventListener("DOMContentLoaded", bootstrapApp);
    </script>
  </body>
</html>
